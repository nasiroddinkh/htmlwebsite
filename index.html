<!DOCTYPE html>
<html>
<head>
<title>My DevOps Website</title>
<style>
body {
    font-family: Arial;
    margin:0;
    background:#0f172a;
    color:white;
}
header {
    background:#2563eb;
    padding:20px;
    text-align:center;
    font-size:28px;
}
section {
    padding:40px;
    text-align:center;
}
.card {
    background:#1e293b;
    margin:20px auto;
    padding:20px;
    width:300px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}
button {
    padding:10px 20px;
    border:none;
    background:#22c55e;
    color:white;
    border-radius:5px;
    cursor:pointer;
}
button:hover {
    background:#16a34a;
}
footer {
    background:#111827;
    padding:15px;
    text-align:center;
    margin-top:40px;
}
</style>
</head>

<body>

<header>
🚀 My CI/CD Demo Website
</header>

<section>
<h2>Hello 👋</h2>
<p>This website is deployed automatically using Jenkins CI/CD pipeline.</p>

<div class="card">
<h3>Build Status</h3>
<p id="status">Waiting for deployment...</p>
<button onclick="deploy()">Simulate Deploy</button>
</div>

</section>

<footer>
Made with ❤️ for Jenkins Poll SCM Demo
</footer>

<script>
function deploy(){
document.getElementById("status").innerText="Deployment Successful ✅";
}
</script>

</body>
</html>
